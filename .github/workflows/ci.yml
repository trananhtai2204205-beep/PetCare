name: 🐾 PetCare CI + SonarCloud

on:
  push:
    branches: [ "main", "master", "develop", "feature/giao-dien-le-tan" ]
  pull_request:
    branches: [ "main", "master", "develop", "feature/giao-dien-le-tan" ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Kiểm tra Frontend
  # ─────────────────────────────────────────
  frontend-ci:
    name: ✅ Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Cài dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install."
          fi

      - name: 🔍 Type Check
        run: |
          if [ -f package.json ]; then
            npx vue-tsc --build --noEmit || true
          else
            echo "Skipping type check."
          fi

      - name: 🏗️ Build project
        run: |
          if [ -f package.json ]; then
            npm run build-only || npm run build || true
          else
            echo "Skipping build."
          fi

      - name: ✅ Build thành công
        run: echo "✅ Xử lý hoàn tất!"

  # ─────────────────────────────────────────
  # JOB 2: Phân tích SonarCloud
  # ─────────────────────────────────────────
  sonarcloud:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: frontend-ci

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔎 Phân tích SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
