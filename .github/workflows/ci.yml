name: 🐾 PetCare CI + SonarCloud

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Kiểm tra Frontend
  # ─────────────────────────────────────────
  frontend-ci:
    name: ✅ Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Cài dependencies
        run: npm install

      - name: 🔍 Type Check
        run: npx vue-tsc --build --noEmit
        continue-on-error: true

      - name: 🏗️ Build project
        run: npm run build-only

      - name: ✅ Build thành công
        run: echo "✅ Build hoàn tất thành công!"

  # ─────────────────────────────────────────
  # JOB 2: Phân tích SonarCloud
  # ─────────────────────────────────────────
  sonarcloud:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: frontend-ci

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Cài dependencies
        run: npm install

      - name: 🔎 Phân tích SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
